services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: afcfta-intelligence:prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: afcfta
      POSTGRES_USER: afcfta
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata_prod: