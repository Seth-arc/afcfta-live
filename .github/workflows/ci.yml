name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check app tests scripts

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/python --config p/owasp-top-ten --error app scripts

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-unit-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install unit test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: >
          python -m pytest tests/unit -v
          --junitxml=artifacts/unit-tests.xml
          --cov=app/services --cov=app/schemas --cov=app/core
          --cov-report=term-missing --cov-report=xml:artifacts/unit-coverage.xml --cov-fail-under=90

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.sha }}
          path: artifacts/unit-tests.xml

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report-${{ github.sha }}
          path: artifacts/unit-coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-integration-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install integration dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install psycopg2-binary

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Run integration tests
        run: >
          python -m pytest tests/integration -v
          --junitxml=artifacts/integration-tests.xml
          --cov --cov-report=term-missing --cov-report=xml:artifacts/integration-coverage.xml

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-${{ github.sha }}
          path: artifacts/integration-tests.xml

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report-${{ github.sha }}
          path: artifacts/integration-coverage.xml

  assistant-nim-tests:
    name: Assistant and NIM Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-assistant-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install assistant/NIM dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install psycopg2-binary

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Run assistant and NIM suites
        run: >
          python -m pytest
          tests/integration/test_assistant_api.py
          tests/integration/test_nim_full_flow.py
          tests/unit/test_decision_renderer.py
          tests/unit/test_counterfactual_engine.py
          tests/unit/test_rendering_service.py
          -v
          --junitxml=artifacts/assistant-nim-tests.xml
          --cov=app.api.v1.assistant
          --cov=app.services.nim
          --cov=app.schemas.nim
          --cov-report=term-missing
          --cov-report=xml:artifacts/assistant-nim-coverage.xml
          --cov-fail-under=80

      - name: Upload assistant/NIM test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-nim-test-report-${{ github.sha }}
          path: artifacts/assistant-nim-tests.xml

      - name: Upload assistant/NIM coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-nim-coverage-report-${{ github.sha }}
          path: artifacts/assistant-nim-coverage.xml

  load-baseline:
    name: Load Baseline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-load-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: WARNING
      LOG_REQUESTS_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      REDIS_URL: redis://localhost:6379/0
      UVICORN_WORKERS: "4"
      # Pool must accommodate 100 concurrent REPEATABLE READ sessions.
      # Four workers x (12 + 12) = 96 potential connections, which stays below
      # the default Postgres service limit while giving each worker headroom.
      DB_POOL_SIZE: "12"
      DB_POOL_MAX_OVERFLOW: "12"
      CACHE_STATUS_LOOKUPS: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install ".[dev]"

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers "${UVICORN_WORKERS}" &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/ready > /dev/null 2>&1; then
              echo "API ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready within 60s" >&2
          exit 1

      - name: Warm assessment caches
        run: >
          python tests/load/run_load_test.py
          --mode burst
          --concurrency 2
          --requests 20
          --api-key ci-load-test-key
          --report artifacts/load-report-warmup.json

      - name: Run burst load test
        run: >
          python tests/load/run_load_test.py
          --mode burst
          --concurrency 10
          --requests 50
          --api-key ci-load-test-key
          --report artifacts/load-report-ci.json

      - name: Compare against baseline
        run: >
          python tests/load/compare_reports.py
          --baseline tests/load/baseline.json
          --report artifacts/load-report-ci.json
          --latency-tolerance-pct 25
          --min-success-rate 95
          --max-p95-latency-s 0.5
          --max-network-errors 0

      - name: Run 100-concurrency load test
        run: >
          python tests/load/run_load_test.py
          --mode burst
          --concurrency 100
          --requests 500
          --api-key ci-load-test-key
          --report artifacts/load-report-100.json

      - name: Regression gate — 100-concurrency vs baseline
        run: >
          python tests/load/compare_reports.py
          --baseline tests/load/baseline_100c.json
          --report artifacts/load-report-100.json
          --latency-tolerance-pct 50
          --min-success-rate 95
          --max-network-errors 0

      - name: Verify tracked files stayed clean
        run: |
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git status --short
            exit 1
          fi

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-baseline-report-${{ github.sha }}
          path: |
            artifacts/load-report-warmup.json
            artifacts/load-report-ci.json
            artifacts/load-report-100.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t afcfta-intelligence:ci .

      - name: Scan image for critical vulnerabilities (trivy)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed afcfta-intelligence:ci

  deploy-approval:
    name: Deploy Approval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - secret-scan
      - sast
      - unit-tests
      - integration-tests
      - assistant-nim-tests
      - load-baseline
      - docker-build
    runs-on: ubuntu-latest
    environment:
      name: preprod-approval
    steps:
      - name: Await protected environment approval
        run: echo "Pre-production approval recorded for ${GITHUB_SHA}"
