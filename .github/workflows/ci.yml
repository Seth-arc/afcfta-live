name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check app tests scripts

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-unit-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install unit test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: >
          python -m pytest tests/unit -v
          --junitxml=artifacts/unit-tests.xml
          --cov --cov-report=term-missing --cov-report=xml

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: artifacts/unit-tests.xml

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: artifacts/coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-integration-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install integration dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install psycopg2-binary

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Run integration tests
        run: >
          python -m pytest tests/integration -v
          --junitxml=artifacts/integration-tests.xml
          --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: artifacts/integration-tests.xml

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: artifacts/coverage.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t afcfta-intelligence:ci .