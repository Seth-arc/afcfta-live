name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check app tests scripts

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-unit-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install unit test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: >
          python -m pytest tests/unit -v
          --junitxml=artifacts/unit-tests.xml
          --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: artifacts/unit-tests.xml

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: artifacts/coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-integration-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install integration dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install psycopg2-binary

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Run integration tests
        run: >
          python -m pytest tests/integration -v
          --junitxml=artifacts/integration-tests.xml
          --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=82

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: artifacts/integration-tests.xml

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: artifacts/coverage.xml

  load-baseline:
    name: Load Baseline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: afcfta
          POSTGRES_USER: afcfta
          POSTGRES_PASSWORD: afcfta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afcfta -d afcfta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://afcfta:afcfta_dev@localhost:5432/afcfta
      DATABASE_URL_SYNC: postgresql://afcfta:afcfta_dev@localhost:5432/afcfta
      API_AUTH_KEY: ci-load-test-key
      API_AUTH_PRINCIPAL: github-actions
      API_AUTH_HEADER_NAME: X-API-Key
      ENV: ci
      LOG_LEVEL: WARNING
      RATE_LIMIT_ENABLED: "false"
      # Pool must accommodate 100 concurrent REPEATABLE READ sessions.
      # Default (5+10=15) exhausts under 100c and causes p95 to balloon ~5×.
      DB_POOL_SIZE: "20"
      DB_POOL_MAX_OVERFLOW: "80"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed reference data
        run: python scripts/seed_data.py

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/ready > /dev/null 2>&1; then
              echo "API ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready within 60s" >&2
          exit 1

      - name: Run burst load test
        run: >
          python tests/load/run_load_test.py
          --mode burst
          --concurrency 10
          --requests 50
          --api-key ci-load-test-key
          --report artifacts/load-report-ci.json

      - name: Compare against baseline
        run: >
          python tests/load/compare_reports.py
          --baseline tests/load/baseline.json
          --report artifacts/load-report-ci.json
          --latency-tolerance-pct 25
          --min-success-rate 95

      - name: Run 100-concurrency load test
        run: >
          python tests/load/run_load_test.py
          --mode burst
          --concurrency 100
          --requests 500
          --api-key ci-load-test-key
          --report artifacts/load-report-100.json

      - name: Regression gate — 100-concurrency vs baseline
        run: >
          python tests/load/compare_reports.py
          --baseline tests/load/baseline_100c.json
          --report artifacts/load-report-100.json
          --latency-tolerance-pct 50
          --min-success-rate 95

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-baseline-report
          path: |
            artifacts/load-report-ci.json
            artifacts/load-report-100.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t afcfta-intelligence:ci .

      - name: Scan image for critical vulnerabilities (trivy)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed afcfta-intelligence:ci